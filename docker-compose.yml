services:
  web:
    build: .
    ports:
      - "8081:80"
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: php-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: restaurant
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./restaurant.sql:/docker-entrypoint-initdb.d/restaurant.sql

volumes:
  db_data:
